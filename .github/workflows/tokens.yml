name: Generate Design Tokens
on: [push]

jobs:
  build-tokens:
    runs-on: ubuntu-latest
    permissions: # Added this to reinforce the permission
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Style Dictionary
        run: npm install style-dictionary

      - name: Build Tokens
        run: npx style-dictionary build

      - name: Commit and Push CSS
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add build/css/variables.css
          git commit -m "Update CSS variables from Figma" || echo "No changes to commit"
          git push